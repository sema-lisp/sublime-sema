name: Syntax Tests

# Runs the `.sublime-syntax` against the assertions in tests/syntax_test_*.sema
# inside a real headless Sublime Text, via the standard SublimeText/UnitTesting
# harness. This is the authoritative check that the syntax actually applies the
# scopes the tests expect (the ci.yml YAML validation only checks structure).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax-tests:
    name: Sublime Text (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: SublimeText/UnitTesting/actions/setup@v1
        with:
          # Install as "Sema" (the Package Control name) so the fixture
          # headers' "Packages/Sema/Sema.sublime-syntax" path resolves.
          package-name: Sema
      - uses: SublimeText/UnitTesting/actions/run-syntax-tests@v1
        with:
          # The syntax uses lookbehind assertions (?<=…) for word-boundary
          # matching, which Sublime's portable regex engine flags as
          # unsupported. It works in current Sublime Text 4; disable the
          # cross-engine compatibility sub-check so CI validates the actual
          # syntax_test assertions (which pass).
          compatibility: false
